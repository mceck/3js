<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaults of the Forgotten Architect</title>
  <script type="module" crossorigin src="/3js/assets/index-BKMu21ER.js"></script>
  <link rel="stylesheet" crossorigin href="/3js/assets/index-DDXZ0ltl.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div id="ui-top">
      <div id="level-name">Chamber of First Light</div>
      <div id="move-counter">Moves: 0</div>
    </div>
    <div id="ui-controls" class="desktop-only">
      <span>WASD/Arrows: Move</span>
      <span>Z: Undo</span>
      <span>R: Reset</span>
      <span>Mouse: Rotate camera</span>
    </div>
  </div>

  <!-- Mobile controls -->
  <div id="mobile-controls">
    <div id="mobile-actions">
      <button class="mobile-action-btn" id="btn-undo">Undo</button>
      <button class="mobile-action-btn" id="btn-reset">Reset</button>
    </div>
    <div id="mobile-camera">
      <button class="mobile-action-btn camera-rotate-btn" id="btn-cam-left">&#x21B6; View</button>
      <button class="mobile-action-btn camera-rotate-btn" id="btn-cam-right">View &#x21B7;</button>
    </div>
    <div id="dpad">
      <button class="dpad-btn" id="dpad-up" data-dx="0" data-dz="-1"></button>
      <button class="dpad-btn" id="dpad-left" data-dx="-1" data-dz="0"></button>
      <button class="dpad-btn dpad-center"></button>
      <button class="dpad-btn" id="dpad-right" data-dx="1" data-dz="0"></button>
      <button class="dpad-btn" id="dpad-down" data-dx="0" data-dz="1"></button>
    </div>
  </div>

  <!-- Level intro overlay -->
  <div id="level-intro" class="hidden">
    <div id="intro-box">
      <h2 id="intro-level-name"></h2>
      <p id="intro-description"></p>
      <button id="intro-start-btn">Begin</button>
    </div>
  </div>

  <!-- Level complete overlay -->
  <div id="level-complete" class="hidden">
    <div id="complete-box">
      <h2 id="complete-heading">Chamber Activated</h2>
      <p id="complete-narrative"></p>
      <p id="complete-moves"></p>
      <button id="next-level-btn">Next Chamber</button>
    </div>
  </div>

  <!-- Title screen -->
  <div id="title-screen">
    <div id="title-content">
      <h1>Vaults of the<br/>Forgotten Architect</h1>
      <p class="subtitle">Deep beneath the surface, the Architect's chambers lie dormant.<br/>Push the energy cores onto the power plates to reawaken them.</p>
      <button id="start-btn">Enter the Vaults</button>
      <div id="level-select"></div>
    </div>
  </div>

</body>
</html>
